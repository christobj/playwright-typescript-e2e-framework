# BrowserStack cross-browser scaffold — SCAFFOLD ONLY, not wired to a live account.
# Fill in BROWSERSTACK_USERNAME / BROWSERSTACK_ACCESS_KEY in .env before use.
# Run with: npm run test:browserstack
userName: ${BROWSERSTACK_USERNAME}
accessKey: ${BROWSERSTACK_ACCESS_KEY}

framework: playwright

platforms:
  - os: Windows
    osVersion: 11
    browserName: chrome
    browserVersion: latest
  - os: OS X
    osVersion: Sonoma
    browserName: playwright-webkit
    browserVersion: latest
  - deviceName: iPhone 14
    osVersion: 16
    browserName: playwright-webkit
    realMobile: true

parallelsPerPlatform: 1
buildName: playwright-typescript-e2e-framework
projectName: automationexercise-e2e
debug: false
networkLogs: false
