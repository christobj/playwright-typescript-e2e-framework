name: Update Visual Baselines

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Copy environment file
        run: cp .env.example .env

      - name: Regenerate visual baselines
        run: npx playwright test e2e/tests/specs/visual.spec.ts --update-snapshots

      - name: Open PR with updated baselines
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update visual regression baselines (linux)'
          title: 'chore: update visual regression baselines (linux)'
          body: |
            Auto-generated by the **Update Visual Baselines** workflow, run on `ubuntu-latest`
            to match the OS used by `.github/workflows/e2e-tests.yml`.

            Review the diffed `*-linux.png` files before merging. Once merged, if
            `@visual` is still excluded from the main E2E workflow, remove the
            `--grep-invert "@visual"` filter there so visual regression runs on every push/PR.
          branch: chore/update-visual-baselines
          add-paths: e2e/tests/specs/**/*-snapshots/**
