name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run against'
        required: false
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ github.event.inputs.browser || 'chromium' }}

      - name: Copy environment file
        run: cp .env.example .env

      - name: Type check
        run: npm run typecheck

      - name: Run Playwright tests
        # @visual is excluded: its baselines must be generated against the same OS/browser
        # combination as this runner (see README's Visual Regression section) before it can
        # run here without failing on the first, baseline-less execution.
        run: npx playwright test --project=${{ github.event.inputs.browser || 'chromium' }} --grep-invert "@visual"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
